    <path d="M6 2v2" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10 2v2" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M14 2v2" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 眼睛 -->
    <circle cx="8" cy="13" r="1.2" fill="#2563eb"/>
    <circle cx="12" cy="13" r="1.2" fill="#2563eb"/>
    <!-- 笑脸 -->
    <path d="M8 16c1 1.5 3 1.5 4 0" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

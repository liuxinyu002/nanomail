appId: com.nanomail.app
productName: NanoMail
directories:
  output: release
  buildResources: build

# 过滤掉 macOS AppleDouble 文件（._*），这些文件会导致 ASAR 打包失败
# 同时排除 release 目录，避免把之前构建的产物打包进去
# 后端编译产物通过构建脚本复制到 electron/dist/backend 目录
files:
  - "dist/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!node_modules/better-sqlite3/deps/**/*"
  - "!node_modules/better-sqlite3/src/**/*"
  - "!node_modules/better-sqlite3/build/Release/obj/**/*"
  - "!node_modules/better-sqlite3/build/Makefile"
  - "!**/*.ts"
  - "!**/*.test.*"
  - "!**/__tests__/**/*"
  - "!**/._*"
  - "!**/.DS_Store"
  - "!release/**/*"

# 前端保持为外部资源（通过 loadFile 加载 HTML）
extraResources:
  - from: "../frontend/dist"
    to: "frontend"
    filter:
      - "**/*"

# macOS 配置
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  # 输出文件名格式：NanoMail-{version}-{arch}.{ext}
  # arch: x64, arm64, universal
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows 配置
win:
  icon: build/icon.ico
  # 输出文件名格式：NanoMail-{version}-{arch}.{ext}
  # arch: x64, arm64, ia32
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # 安装程序文件名格式
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  # 使用自定义图标
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

# 通用配置
asar: true
# 将含有 .node 文件的原生模块从 ASAR 中解压出来
# Node.js 无法直接从 ASAR 压缩包内执行 .node 文件
# 注意：只解压 better-sqlite3，不解压 bindings（bindings 是纯 JS，可在 ASAR 内运行）
asarUnpack:
  - "**/*.node"
  - "node_modules/better-sqlite3/**/*"
compression: maximum